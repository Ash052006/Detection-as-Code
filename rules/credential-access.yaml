# =============================================================================
# DETECTION RULE: Credential dumping / sensitive access
# =============================================================================
# Patterns related to credential theft, dump, or sensitive file access.
# =============================================================================

id: credential-access-004
name: "Credential dumping or sensitive access"
description: "Alert when log suggests credential dump or access to secrets"
severity: critical
enabled: true

condition:
  type: log_match
  field: message
  patterns:
    - "mimikatz"
    - "sekurlsa"
    - "lsass"
    - "procdump"
    - "dump"
    - "credential"
    - "SAM"
    - "SYSTEM"
    - "ntds.dit"
    - "Get-Content *password"
    - "passwd"
    - "shadow"
    - "/etc/shadow"
    - "registry query"
    - "reg save"
    - "dpapi"
    - "token::"
    - "hash::"
    - "kerberos::"
